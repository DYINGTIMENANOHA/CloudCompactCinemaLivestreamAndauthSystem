<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>网络速度测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',Arial,sans-serif;background:#0a0a0a;color:#fff;background-image:url('/static/background.jpg');background-size:cover;background-position:center;background-attachment:fixed;min-height:100vh;display:flex;align-items:center;justify-content:center}
.overlay{background:rgba(0,0,0,0.8);min-height:100vh;width:100%;display:flex;align-items:center;justify-content:center;padding:20px}
.container{max-width:800px;width:100%}
.header{text-align:center;padding:30px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border-radius:10px;margin-bottom:30px;box-shadow:0 10px 30px rgba(0,0,0,0.5)}
.header h1{font-size:2.5em;text-shadow:2px 2px 4px rgba(0,0,0,0.3);margin-bottom:10px}
.header p{font-size:1.1em;opacity:0.9}
.back-link{display:inline-block;margin-top:15px;color:#fff;text-decoration:none;background:rgba(255,255,255,0.2);padding:10px 20px;border-radius:5px;transition:all 0.3s}
.back-link:hover{background:rgba(255,255,255,0.3);transform:scale(1.05)}
.test-container{background:#1a1a1a;border-radius:10px;padding:30px;box-shadow:0 10px 30px rgba(0,0,0,0.5)}
.test-section{margin-bottom:30px}
.test-section h2{color:#667eea;margin-bottom:15px;font-size:1.5em}
.speed-display{background:#2a2a2a;padding:30px;border-radius:10px;text-align:center;margin-bottom:20px;border-left:4px solid #667eea}
.speed-value{font-size:3em;font-weight:bold;color:#667eea;margin-bottom:10px}
.speed-label{font-size:1.2em;color:#888}
.metrics-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:15px;margin-bottom:20px}
.metric-box{background:#2a2a2a;padding:20px;border-radius:8px;text-align:center}
.metric-value{font-size:2em;font-weight:bold;color:#fff;margin-bottom:5px}
.metric-label{font-size:0.9em;color:#888}
.metric-download{border-left:4px solid #4CAF50}
.metric-upload{border-left:4px solid #2196F3}
.metric-ping{border-left:4px solid #FF9800}
.start-btn{width:100%;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border:none;color:white;padding:20px;border-radius:10px;cursor:pointer;font-size:1.3em;font-weight:bold;transition:all 0.3s;box-shadow:0 4px 12px rgba(102,126,234,0.3)}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(102,126,234,0.5)}
.start-btn:disabled{background:#555;cursor:not-allowed;transform:none}
.progress-bar{width:100%;height:30px;background:#2a2a2a;border-radius:15px;overflow:hidden;margin-bottom:20px}
.progress-fill{height:100%;background:linear-gradient(90deg,#667eea 0%,#764ba2 100%);width:0%;transition:width 0.3s;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:bold;font-size:0.9em}
.status-text{text-align:center;color:#888;margin-bottom:15px;font-size:1.1em}
.chart-container{background:#2a2a2a;padding:20px;border-radius:10px;margin-bottom:20px;height:250px;position:relative}
.chart-canvas{width:100%;height:100%}
.stability-indicator{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:15px}
.stability-dot{width:12px;height:12px;border-radius:50%;background:#4CAF50;animation:pulse 2s infinite}
.stability-excellent{background:#4CAF50}
.stability-good{background:#8BC34A}
.stability-fair{background:#FF9800}
.stability-poor{background:#F44336}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.test-info{background:rgba(102,126,234,0.1);padding:15px;border-radius:8px;border-left:3px solid #667eea;margin-top:20px}
.test-info p{margin:5px 0;color:#ccc}
</style>
</head>
<body>
<div class="overlay">
<div class="container">
<div class="header">
<h1>🚀 网络速度测试</h1>
<p>测试您到服务器的网络连接质量</p>
<a href="/watch?token={{ token }}" class="back-link">← 返回直播间</a>
</div>
<div class="test-container">
<div class="test-section">
<h2>📊 实时速度</h2>
<div class="speed-display">
<div class="speed-value" id="current-speed">0</div>
<div class="speed-label">MB/s</div>
</div>
<div class="metrics-grid">
<div class="metric-box metric-download">
<div class="metric-value" id="download-speed">--</div>
<div class="metric-label">⬇️ 下载 (MB/s)</div>
</div>
<div class="metric-box metric-upload">
<div class="metric-value" id="upload-speed">--</div>
<div class="metric-label">⬆️ 上传 (MB/s)</div>
</div>
<div class="metric-box metric-ping">
<div class="metric-value" id="ping-time">--</div>
<div class="metric-label">📡 延迟(ms)</div>
</div>
</div>
<div class="progress-bar">
<div class="progress-fill" id="progress-bar">0%</div>
</div>
<div class="status-text" id="status-text">点击开始按钮进行测试</div>
<button class="start-btn" id="start-btn" onclick="startTest()">🚀 开始测试</button>
<div class="stability-indicator" id="stability-indicator" style="display:none;">
<div class="stability-dot" id="stability-dot"></div>
<span id="stability-text">连接稳定性: 检测中...</span>
</div>
</div>
<div class="test-section">
<h2>📈 速度历史图表</h2>
<div class="chart-container">
<canvas id="speed-chart" class="chart-canvas"></canvas>
</div>
</div>
<div class="test-info">
<p><strong>测试说明：</strong></p>
<p>• 下载测试：从服务器下载数据，测试下行带宽</p>
<p>• 上传测试：向服务器上传数据，测试上行带宽</p>
<p>• 延迟测试：测量数据往返时间(RTT)</p>
<p>• 稳定性测试：持续30秒监测速度波动</p>
<p>• <strong>单位说明：</strong>1 MB/s = 8 Mbps (观看10Mbps直播需要 1.25 MB/s)</p>
</div>
</div>
</div>
</div>
<script>
let isTestRunning=false;
let speedHistory=[];
let chart=null;
let stabilityData=[];

function initChart(){
const canvas=document.getElementById('speed-chart');
const ctx=canvas.getContext('2d');
chart={canvas:canvas,ctx:ctx,data:[]};
}

function drawChart(){
if(!chart)return;
const ctx=chart.ctx;
const canvas=chart.canvas;
const width=canvas.offsetWidth;
const height=canvas.offsetHeight;
canvas.width=width;
canvas.height=height;
ctx.clearRect(0,0,width,height);
if(speedHistory.length===0){
ctx.fillStyle='#666';
ctx.font='16px Arial';
ctx.textAlign='center';
ctx.fillText('开始测试后将显示速度曲线',width/2,height/2);
return;
}
ctx.strokeStyle='#333';
ctx.lineWidth=1;
for(let i=0;i<=5;i++){
const y=(height/5)*i;
ctx.beginPath();
ctx.moveTo(0,y);
ctx.lineTo(width,y);
ctx.stroke();
}
const maxSpeed=Math.max(...speedHistory,1);
ctx.strokeStyle='#667eea';
ctx.lineWidth=3;
ctx.beginPath();
speedHistory.forEach((speed,index)=>{
const x=(width/(speedHistory.length-1||1))*index;
const y=height-(speed/maxSpeed*height);
if(index===0){
ctx.moveTo(x,y);
}else{
ctx.lineTo(x,y);
}
});
ctx.stroke();
ctx.fillStyle='#888';
ctx.font='12px Arial';
ctx.textAlign='right';
for(let i=0;i<=5;i++){
const value=(maxSpeed/5*(5-i)).toFixed(1);
const y=(height/5)*i;
ctx.fillText(value+' MB/s',width-5,y+4);
}
}

async function testPing(){
const pings=[];
for(let i=0;i<5;i++){
const start=performance.now();
await fetch('/api/speed-test/ping');
const end=performance.now();
pings.push(end-start);
}
const avgPing=pings.reduce((a,b)=>a+b,0)/pings.length;
document.getElementById('ping-time').textContent=avgPing.toFixed(0);
return avgPing;
}

async function testDownload(){
const startTime=performance.now();
const response=await fetch('/api/speed-test/download?size=20');
const reader=response.body.getReader();
let totalBytes=0;
while(true){
const{done,value}=await reader.read();
if(done)break;
totalBytes+=value.length;
const elapsed=(performance.now()-startTime)/1000;
const speedMBs=(totalBytes/1000000)/elapsed;
document.getElementById('current-speed').textContent=speedMBs.toFixed(2);
document.getElementById('download-speed').textContent=speedMBs.toFixed(2);
speedHistory.push(speedMBs);
drawChart();
}
const totalTime=(performance.now()-startTime)/1000;
const finalSpeed=(totalBytes/1000000)/totalTime;
return finalSpeed;
}

async function testUpload(){
const size=10*1024*1024;
const data=new ArrayBuffer(size);
const startTime=performance.now();
const response=await fetch('/api/speed-test/upload',{
method:'POST',
body:data,
headers:{'Content-Type':'application/octet-stream'}
});
const result=await response.json();
const speedMBs=result.mbps/8;
document.getElementById('upload-speed').textContent=speedMBs.toFixed(2);
document.getElementById('current-speed').textContent=speedMBs.toFixed(2);
return speedMBs;
}

async function testStability(){
document.getElementById('stability-indicator').style.display='flex';
stabilityData=[];
const duration=30;
const startTime=Date.now();
while((Date.now()-startTime)<duration*1000){
const speed=await testDownloadChunk();
stabilityData.push(speed);
const elapsed=(Date.now()-startTime)/1000;
const progress=(elapsed/duration*100);
document.getElementById('progress-bar').style.width=progress+'%';
document.getElementById('progress-bar').textContent=progress.toFixed(0)+'%';
if(stabilityData.length>5){
const avg=stabilityData.reduce((a,b)=>a+b,0)/stabilityData.length;
const variance=stabilityData.reduce((sum,val)=>sum+Math.pow(val-avg,2),0)/stabilityData.length;
const stdDev=Math.sqrt(variance);
const cv=(stdDev/avg)*100;
let stabilityText='';
let stabilityClass='';
if(cv<10){
stabilityText='优秀';
stabilityClass='stability-excellent';
}else if(cv<20){
stabilityText='良好';
stabilityClass='stability-good';
}else if(cv<30){
stabilityText='一般';
stabilityClass='stability-fair';
}else{
stabilityText='较差';
stabilityClass='stability-poor';
}
document.getElementById('stability-text').textContent='连接稳定性: '+stabilityText;
document.getElementById('stability-dot').className='stability-dot '+stabilityClass;
}
}
}

async function testDownloadChunk(){
const startTime=performance.now();
const response=await fetch('/api/speed-test/download?size=2');
const reader=response.body.getReader();
let totalBytes=0;
while(true){
const{done,value}=await reader.read();
if(done)break;
totalBytes+=value.length;
}
const elapsed=(performance.now()-startTime)/1000;
const speedMBs=(totalBytes/1000000)/elapsed;
speedHistory.push(speedMBs);
if(speedHistory.length>50)speedHistory.shift();
document.getElementById('current-speed').textContent=speedMBs.toFixed(2);
drawChart();
return speedMBs;
}

async function startTest(){
if(isTestRunning)return;
isTestRunning=true;
const btn=document.getElementById('start-btn');
btn.disabled=true;
btn.textContent='测试进行中...';
speedHistory=[];
stabilityData=[];
try{
document.getElementById('status-text').textContent='📡 正在测试延迟...';
document.getElementById('progress-bar').style.width='10%';
document.getElementById('progress-bar').textContent='10%';
await testPing();
document.getElementById('status-text').textContent='⬇️ 正在测试下载速度...';
document.getElementById('progress-bar').style.width='30%';
document.getElementById('progress-bar').textContent='30%';
await testDownload();
document.getElementById('status-text').textContent='⬆️ 正在测试上传速度...';
document.getElementById('progress-bar').style.width='50%';
document.getElementById('progress-bar').textContent='50%';
await testUpload();
document.getElementById('status-text').textContent='📊 正在测试连接稳定性（30秒）...';
await testStability();
document.getElementById('status-text').textContent='✅ 测试完成！';
document.getElementById('progress-bar').style.width='100%';
document.getElementById('progress-bar').textContent='100%';
}catch(error){
document.getElementById('status-text').textContent='❌ 测试失败: '+error.message;
}
isTestRunning=false;
btn.disabled=false;
btn.textContent='🔄 重新测试';
}

initChart();
drawChart();
</script>
</body>
</html>
