# SRS优化配置 - 高码率直播专用
listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

http_server {
    enabled         on;
    listen          8090;
    dir             ./objs/nginx/html;
}

http_api {
    enabled         on;
    listen          1985;
}

vhost __defaultVhost__ {
    min_latency     off;
    tcp_nodelay     off;

    gop_cache       on;
    gop_cache_max_frames 60;
    queue_length    30;

    http_hooks {
        enabled     on;
        on_publish  http://127.0.0.1:8888/api/auth/publish;
    }

    play {
        gop_cache   on;
        time_jitter full;
        mix_correct on;
        atc         on;
        send_min_interval 10.0;
    }

    publish {
        mr              off;
        mr_latency      5000;
        firstpkt_timeout 20000;
        normal_timeout  30000;
    }

    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
        fast_cache  30;
        hstrs       on;
    }

    hls {
        enabled         on;
        hls_path        ./objs/nginx/html;
        hls_fragment    3;
        hls_window      12;
    }
    dvr {
        enabled     off;
    }
}

stats {
    network 0;
    disk sda vda;
}
